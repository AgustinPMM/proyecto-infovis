<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géneros de Películas</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chartContainer" style="width:100%; height:650px;"></div>
    <div id="controls">
        <label for="genreSelect">Selecciona un género:</label>
        <select id="genreSelect"></select>
        <label for="volumeSlider" style="margin-left: 15px;">Volume:</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
    </div>

    <script>
        const genreDictionary = {
            28:    "Acción",
            18:    "Drama",
            35:    "Comedia",
            10749: "Romance",
            80:    "Crimen/Suspenso",
            53:    "Crimen/Suspenso",
            16:    "Animación"
        };

        const colorPalette = {
            "Acción":          "#E63946",
            "Drama":           "#882255",
            "Comedia":         "#DDCC77",
            "Romance":         "#CC6677",
            "Crimen/Suspenso": "#1b56e0",
            "Animación":       "#88CCEE"
        };
        // Parámetros para escalado de tamaños
        const MARKER_MIN_SIZE = 4;
        const MARKER_MAX_SIZE = 22;
        const LINE_MIN_WIDTH = 1;
        const LINE_MAX_WIDTH = 7;
        // Función para escalar un valor de un rango a otro
        function scaleValue(value, minVal, maxVal, outMin, outMax) {
            if (maxVal === minVal) return (outMin + outMax) / 2;
            const t = (value - minVal) / (maxVal - minVal);
            return outMin + t * (outMax - outMin);
        }
        // Función para convertir el rating continuo a una frecuencia en Hz
        function ratingToFrequency(rating) {
            // Aseguramos que el rating esté entre 0 y 10
            const clampedRating = Math.max(0, Math.min(10, rating));
            
            // Rango de frecuencias (C2 a A5 en Hertz)
            const minFreq = 65.41; 
            const maxFreq = 880.00; 
            
            // Mapeo logarítmico para que suene proporcional y natural al oído
            const freq = minFreq * Math.pow(maxFreq / minFreq, clampedRating / 10);
            
            return freq;
        }

        // Objeto donde cada género tiene una función que crea un sintetizador con configuracion propia para que suene acorde a la temática del género
        const SYNTH_CONFIG = {
            "Acción": () => new Tone.MetalSynth({
                frequency: 200,
                envelope: { attack: 0.001, decay: 0.1, release: 0.1 },
                harmonicity: 5.1, modulationIndex: 32, resonance: 3200, octaves: 1.5
            }),
            "Drama": () => new Tone.AMSynth({
                harmonicity: 2,
                envelope: { attack: 0.2, decay: 0.2, sustain: 0.6, release: 0.8 },
                modulation: { type: "sine" },
                modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 }
            }),
            "Comedia": () => new Tone.PluckSynth({
                attackNoise: 1, dampening: 4000, resonance: 0.95
            }),
            "Romance": () => new Tone.AMSynth({
                harmonicity: 1.5,
                envelope: { attack: 0.3, decay: 0.1, sustain: 0.8, release: 1.2 },
                modulation: { type: "sine" },
                modulationEnvelope: { attack: 0.8, decay: 0, sustain: 1, release: 1 }
            }),
            "Crimen/Suspenso": () => new Tone.FMSynth({
                harmonicity: 3, modulationIndex: 10,
                envelope: { attack: 0.01, decay: 0.3, sustain: 0.2, release: 0.6 },
                modulation: { type: "sawtooth" }
            }),
            "Animación": () => new Tone.Synth({
                oscillator: { type: "sine" },
                envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 0.8 }
            })
        };
        // Variable global para el volumen global de todos los sintetizadores y para el sintetizador que esté activo actualmente
        let masterVolume, activeSynth;
        // Flag para saber si el audio ya fue iniciado
        let audioStarted = false;   

        // Función para asegurar que el audio esté iniciado y el sintetizador esté construido para el género seleccionado
        async function ensureAudio(genre) {
            if (!audioStarted) {
                await Tone.start();
                masterVolume = new Tone.Volume(Tone.gainToDb(50 / 100)).toDestination();
                audioStarted = true;
            }
            if (!activeSynth) buildSynth(genre);
        }

        function buildSynth(genre) {
            if (activeSynth) {
                try { activeSynth.dispose(); } catch(e) {}
            }
            const factory = SYNTH_CONFIG[genre] || SYNTH_CONFIG["Drama"];
            activeSynth = factory();
            activeSynth.connect(masterVolume);
            activeSynth.volume.value = -10;
        }

        function playNote(rating, count, minC, maxC) {
            if (!audioStarted || !activeSynth) return;
            
            // Usamos nuestra nueva función matemática
            const freq = ratingToFrequency(rating);
            
            const dur = 0.15 + ((count - minC) / Math.max(1, maxC - minC)) * 0.7;
            
            // Le pasamos 'freq' (Hz) en lugar de 'note' (String)
            try { activeSynth.triggerAttackRelease(freq, dur); } catch(e) {}
        }

        fetch('data.json')
            .then(response => response.json())
            .then(movieData => {
                const filteredData = movieData.filter(movie => {
                    if (!movie.release_date) return false;
                    if (!movie.vote_average) return false;
                    const year = parseInt(movie.release_date.substring(0, 4));
                    return year >= 1926 && year <= 2025;
                });

                const statsByYear = {};
                const allGenresSet = new Set();

                filteredData.forEach(movie => {
                    if (movie.vote_average === undefined) return;
                    const releaseYear = parseInt(movie.release_date.substring(0, 4));
                    if (!statsByYear[releaseYear]) statsByYear[releaseYear] = {};

                    movie.genre_ids.forEach(genreId => {
                        const genreName = genreDictionary[genreId];
                        if (!genreName) return;
                        allGenresSet.add(genreName);
                        if (!statsByYear[releaseYear][genreName]) {
                            statsByYear[releaseYear][genreName] = { ratingSum: 0, movieCount: 0 };
                        }
                        statsByYear[releaseYear][genreName].ratingSum += movie.vote_average;
                        statsByYear[releaseYear][genreName].movieCount += 1;
                    });
                });

                const sortedYears = [];
                for (let y = 1926; y <= 2025; y++) sortedYears.push(y);

                const sortedGenres = Array.from(allGenresSet).sort((a, b) => a.localeCompare(b, 'es'));
                const tracesByGenre = {};

                sortedGenres.forEach(genre => {
                    const counts = sortedYears
                        .filter(y => statsByYear[y]?.[genre])
                        .map(y => statsByYear[y][genre].movieCount);

                    const minCount = counts.length ? Math.min(...counts) : 1;
                    const maxCount = counts.length ? Math.max(...counts) : 1;

                    const yValues      = [];
                    const markerSizes  = [];
                    const hoverTexts   = [];

                    sortedYears.forEach(year => {
                        const d = statsByYear[year]?.[genre];
                        if (d) {
                            const avg = parseFloat((d.ratingSum / d.movieCount).toFixed(2));
                            const mSize = scaleValue(d.movieCount, minCount, maxCount, MARKER_MIN_SIZE, MARKER_MAX_SIZE);
                            yValues.push(avg);
                            markerSizes.push(Math.round(mSize));
                            hoverTexts.push(
                                `<b>${genre}</b><br>` +
                                `Año: ${year}<br>` +
                                `Rating: ${avg}<br>` +
                                `Películas: ${d.movieCount}`
                            );
                        } else {
                            yValues.push(null);
                            markerSizes.push(MARKER_MIN_SIZE);
                            hoverTexts.push('');
                        }
                    });

                    const avgCount = counts.length
                        ? counts.reduce((a, b) => a + b, 0) / counts.length
                        : 1;
                    const lineWidth = scaleValue(avgCount, minCount, maxCount, LINE_MIN_WIDTH, LINE_MAX_WIDTH);

                    tracesByGenre[genre] = {
                        x: sortedYears,
                        y: yValues,
                        type: 'scatter',
                        mode: 'lines+markers',
                        name: genre,
                        connectgaps: false,
                        text: hoverTexts,
                        hovertemplate: '%{text}<extra></extra>',
                        line: {
                            color: colorPalette[genre] || "#333",
                            width: lineWidth
                        },
                        marker: {
                            color: colorPalette[genre] || "#333",
                            size: markerSizes,
                            opacity: 0.85
                        }
                    };
                });

                const select = document.getElementById('genreSelect');
                sortedGenres.forEach(genre => {
                    const opt = document.createElement('option');
                    opt.value = genre;
                    opt.textContent = genre;
                    select.appendChild(opt);
                });

                const plotLayout = {
                    title: '',
                    xaxis: {
                        title: 'Año de Lanzamiento',
                        range: [1925.5, 2025.5],
                        tickmode: 'linear',
                        tick0: 1926,
                        dtick: 1,
                        tickangle: -60,
                        automargin: true
                    },
                    yaxis: {
                        title: 'Calificación Promedio',
                        range: [3.5, 8.5]
                    },
                    showlegend: false,
                    shapes: [
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 2020,
                            x1: 2022.5,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#d3d3d3',
                            opacity: 0.5,
                            line: { width: 0 }
                        },
                        {
                            type: 'line',
                            xref: 'x',
                            yref: 'paper',
                            x0: 2007,
                            x1: 2007,
                            y0: 0,
                            y1: 1,
                            line: {
                                color: '#e50914',
                                width: 2,
                                dash: 'dash'
                            }
                        },
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1920,
                            x1: 1930,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#FBD028',
                            opacity: 0.1,
                            line: { width: 0 }
                        },
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1939,
                            x1: 1945,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#5D6532',
                            opacity: 0.1,
                            line: { width: 0 }
                        },
                        {
                            type: 'line',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1932,
                            x1: 1932,
                            y0: 0,
                            y1: 1,
                            line: {
                                color: '#000000',
                                width: 2,
                                dash: 'dash'
                            }
                        },
                        {type: 'line',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1975,
                            x1: 1975,
                            y0: 0,
                            y1: 1,
                            line: {
                                color: '#0D3FA9',
                                width: 2,
                                dash: 'dash'
                            }
                        },
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1989,
                            x1: 1999,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#FF69B4',
                            opacity: 0.1,
                            line: { width: 0 }
                        },
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 2007,
                            x1: 2008,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#000000',
                            opacity: 0.1,
                            line: { width: 0 }
                        },
                        {
                            type: 'line',
                            xref: 'x',
                            yref: 'paper',
                            x0: 1968,
                            x1: 1968,
                            y0: 0,
                            y1: 1,
                            line: {
                                color: '#000000',
                                width: 2,
                                dash: 'dash'
                            }
                        }
                    ],
                    annotations: [
                        {
                            x: 2021,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'COVID-19',
                            showarrow: false,
                            font: { size: 12, color: '#888888' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 2007,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Inicio del streaming',
                            showarrow: false,
                            font: { size: 12, color: '#b20710' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 1927,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Edad de Oro de Hollywood',
                            showarrow: false,
                            font: { size: 12, color: '#EFBF04' },
                            yanchor: 'bottom'
                        }
                        ,
                        {
                            x: 1942,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Segunda Guerra Mundial',
                            showarrow: false,
                            font: { size: 12, color: '#5D6532' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 1932,
                            y: 1.03,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Tres colores primarios al cine',
                            showarrow: false,
                            font: { size: 12, color: '#000000' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 1975,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Inicio de los blockbusters',
                            showarrow: false,
                            font: { size: 12, color: '#0D3FA9' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 1994,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Renacimiento de Disney',
                            showarrow: false,
                            font: { size: 12, color: '#FF69B4' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 2007.5,
                            y: 1.03,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Huelga de guionistas de Hollywood',
                            showarrow: false,
                            font: { size: 12, color: '#000000' },
                            yanchor: 'bottom'
                        },
                        {
                            x: 1968,
                            y: 1.03,
                            xref: 'x',
                            yref: 'paper',
                            text: 'Fin del Código Hays',
                            showarrow: false,
                            font: { size: 12, color: '#000000' },
                            yanchor: 'bottom'
                        }

                    ]
                };

                function renderGenre(genre) {
                    currentGenre = genre;
                    plotLayout.title = {
                        text: `Calificación promedio — ${genre} (1926-2025)<br><sub>De las 100 películas más populares por año</sub>`,
                        x: 0.5,
                        y: 0.97,
                        xanchor: 'center'
                    };
                    Plotly.newPlot('chartContainer', [tracesByGenre[genre]], plotLayout, { responsive: true });

                    // Hover: tocar nota al pasar el cursor por un punto
                    const chartDiv = document.getElementById('chartContainer');
                    chartDiv.removeAllListeners('plotly_hover');
                    chartDiv.on('plotly_hover', async (eventData) => {
                        const point = eventData.points?.[0];
                        if (!point || point.y === null) return;

                        await ensureAudio(currentGenre);

                        const counts = sortedYears
                            .filter(y => statsByYear[y]?.[currentGenre])
                            .map(y => statsByYear[y][currentGenre].movieCount);
                        const minC = Math.min(...counts);
                        const maxC = Math.max(...counts);

                        const count = statsByYear[point.x]?.[currentGenre]?.movieCount || 1;
                        playNote(point.y, count, minC, maxC);
                    });
                }

                const initialGenre = sortedGenres[0];
                let currentGenre = initialGenre;
                select.value = initialGenre;
                renderGenre(initialGenre);

                select.addEventListener('change', async (e) => {
                    const genre = e.target.value;
                    await ensureAudio(genre);
                    buildSynth(genre);
                    renderGenre(genre);
                });
                const volumeSlider = document.getElementById('volumeSlider');

                volumeSlider.addEventListener('input', async (e) => {

                    if (!audioStarted) {
                        const currentSelectedGenre = document.getElementById('genreSelect').value;
                        await ensureAudio(currentSelectedGenre);
                    }

                    if (!masterVolume) return;
                    
                    const sliderVal = parseInt(e.target.value);

                    if (sliderVal === 0) {
                        // Silenciamos completamente
                        masterVolume.mute = true;
                    } else {
                        // Quitamos el mute y calculamos el volumen
                        masterVolume.mute = false;
                        masterVolume.volume.value = Tone.gainToDb(sliderVal / 100);
                    }
                });
            })
            .catch(error => console.error("Error loading data:", error));
    </script>
</body>
</html>
