<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géneros de Películas</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head>
<body>
    <div style="margin-bottom: 15px;">
     <label for="genreSelect" style="font-weight: 600; margin-right: 8px;">Selecciona un género:</label>
        <select id="genreSelect" style="padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; min-width: 220px;"></select>
    </div>
    <div id="chartContainer" style="width:100%; height:650px;"></div>

    <script>
        const genreDictionary = {
            28: "Acción",
            12: "Aventura",
            16: "Animación",
            35: "Comedia",
            80: "Crimen",
            99: "Documental",
            18: "Drama",
            10751: "Familia",
            14: "Fantasía",
            36: "Historia",
            27: "Terror",
            10402: "Música",
            9648: "Misterio",
            10749: "Romance",
            878: "Ciencia Ficción",
            10770: "Película de TV",
            53: "Suspenso",
            10752: "Guerra",
            37: "Western"
        };

        const colorPalette = {
            "Acción": "#E63946",
            "Drama": "#882255",
            "Comedia": "#DDCC77",
            "Romance": "#CC6677",
            "Animación": "#88CCEE",
            "Crimen": "#1b56e0",
            "Aventura": "#F4A261",
            "Documental": "#6A994E",
            "Familia": "#FFB4A2",
            "Fantasía": "#9B5DE5",
            "Historia": "#8D6E63",
            "Terror": "#222222",
            "Música": "#F72585",
            "Misterio": "#3A0CA3",
            "Ciencia Ficción": "#00B4D8",
            "Película de TV": "#A8A8A8",
            "Suspenso": "#4361EE",
            "Guerra": "#4A4E69",
            "Western": "#B5651D"
        };

        fetch('data.json')
            .then(response => response.json())
            .then(movieData => {
                const filteredData = movieData.filter(movie => {
                    if (!movie.release_date) return false;
                    const year = parseInt(movie.release_date.substring(0, 4));
                    return year >= 1926 && year <= 2025;
                });

                const statsByYear = {};
                const allGenresSet = new Set();
                const allYearsSet = new Set();

                filteredData.forEach(movie => {
                    if (!movie.release_date || movie.vote_average === undefined) return;

                    const releaseYear = parseInt(movie.release_date.substring(0, 4));
                    allYearsSet.add(releaseYear);

                    if (!statsByYear[releaseYear]) statsByYear[releaseYear] = {};

                    movie.genre_ids.forEach(genreId => {
                        const genreName = genreDictionary[genreId];
                        if (!genreName) return;
                        allGenresSet.add(genreName);

                        if (!statsByYear[releaseYear][genreName]) {
                            statsByYear[releaseYear][genreName] = { ratingSum: 0, movieCount: 0 };
                        }

                        statsByYear[releaseYear][genreName].ratingSum += movie.vote_average;
                        statsByYear[releaseYear][genreName].movieCount += 1;
                    });
                });

                const sortedYears = Array.from(allYearsSet).sort((a, b) => a - b);

                const sortedGenres = Array.from(allGenresSet).sort((a, b) => a.localeCompare(b, 'es'));
                const tracesByGenre = {};

                sortedGenres.forEach(genre => {
                    const yValues = sortedYears.map(year => {
                        if (statsByYear[year] && statsByYear[year][genre]) {
                            const d = statsByYear[year][genre];
                            return parseFloat((d.ratingSum / d.movieCount).toFixed(2));
                        }
                        return null;
                    });

                    tracesByGenre[genre] = {
                        x: sortedYears,
                        y: yValues,
                        type: 'scatter',
                        mode: 'lines+markers',
                        name: genre,
                        connectgaps: false,
                        hovertemplate: `<b>${genre}</b><br>Año: %{x}<br>Rating: %{y}<extra></extra>`,
                        line: { color: colorPalette[genre] || "#333", width: 3 },
                        marker: { color: colorPalette[genre] || "#333", size: 7 }
                    };
                });

                // Poblar el selector
                const select = document.getElementById('genreSelect');
                sortedGenres.forEach(genre => {
                    const opt = document.createElement('option');
                    opt.value = genre;
                    opt.textContent = genre;
                    select.appendChild(opt);
                });

                const plotLayout = {
                    title: 'Calificación promedio de películas por género (1926-2025)',
                    xaxis: {
                        title: 'Año de Lanzamiento',
                        range: [1925.5, 2025.5],
                        tickmode: 'linear',
                        tick0: 1926,
                        dtick: 1,
                        tickangle: -60,
                        automargin: true
                    },
                    yaxis: {
                        title: 'Calificación Promedio',
                        range: [0, 10]
                    },
                    showlegend: false,
                    shapes: [
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 2020,
                            x1: 2022.5,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#d3d3d3',
                            opacity: 0.3,
                            line: { width: 0 }
                        }
                    ],
                    annotations: [
                        {
                            x: 2021,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'COVID-19',
                            showarrow: false,
                            font: { size: 12, color: '#888888' },
                            yanchor: 'bottom'
                        }
                    ]
                };
                function renderGenre(genre) {
                plotLayout.title = {
                text: `Calificación promedio — ${genre} (1926-2025)<br><sub>De las 100 películas más populares por año</sub>`,
                x: 0.5,
                xanchor: 'center'
            };
                Plotly.newPlot('chartContainer', [tracesByGenre[genre]], plotLayout, { responsive: true });
            }

            const initialGenre = sortedGenres[0];
            select.value = initialGenre;
            renderGenre(initialGenre);

            select.addEventListener('change', (e) => renderGenre(e.target.value));
            })
            .catch(error => console.error("Error loading data:", error));
    </script>
</body>
</html>
