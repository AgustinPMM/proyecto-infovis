<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géneros de Películas</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head>
<body>

    <div id="chartContainer" style="width:100%; height:650px;"></div>

    <script>
        const genreDictionary = {
            28: "Acción",
            12: "Aventura",
            16: "Animación",
            35: "Comedia",
            80: "Crimen",
            99: "Documental",
            18: "Drama",
            10751: "Familia",
            14: "Fantasía",
            36: "Historia",
            27: "Terror",
            10402: "Música",
            9648: "Misterio",
            10749: "Romance",
            878: "Ciencia Ficción",
            10770: "Película de TV",
            53: "Suspenso",
            10752: "Guerra",
            37: "Western"
        };

        const genreMap = {
            "Acción": "Acción",
            "Aventura":"Acción",
            "Drama": "Drama",
            "Comedia": "Comedia",
            "Romance": "Romance",
            "Crimen": "Crimen/Suspenso",
            "Misterio": "Crimen/Suspenso",
            "Suspenso": "Crimen/Suspenso",
            "Animación": "Animación"
        };

        const colorPalette = {
            "Acción": "#D55E00",
            "Drama": "#CC79A7",
            "Comedia":"#F0E442",
            "Romance":"#009E73",
            "Crimen/Suspenso": "#0072B2",
            "Animación": "#000000"
        };

        fetch('data.json')
            .then(response => response.json())
            .then(movieData => {
                const filteredData = movieData.filter(movie => {
                    if (!movie.release_date) return false;
                    const year = parseInt(movie.release_date.substring(0, 4));
                    return year >= 2015 && year <= 2025;
                });

                const statsByYear = {};
                const allGenresSet = new Set();
                const allYearsSet = new Set();

                filteredData.forEach(movie => {
                    if (!movie.release_date || movie.vote_average === undefined) return;

                    const releaseYear = parseInt(movie.release_date.substring(0, 4));
                    allYearsSet.add(releaseYear);

                    if (!statsByYear[releaseYear]) statsByYear[releaseYear] = {};

                    movie.genre_ids.forEach(genreId => {
                        const rawGenre = genreDictionary[genreId];
                        if (!rawGenre) return;
                        const genreName = genreMap[rawGenre];
                        if (!genreName) return;

                        allGenresSet.add(genreName);

                        if (!statsByYear[releaseYear][genreName]) {
                            statsByYear[releaseYear][genreName] = { ratingSum: 0, movieCount: 0 };
                        }

                        statsByYear[releaseYear][genreName].ratingSum += movie.vote_average;
                        statsByYear[releaseYear][genreName].movieCount += 1;
                    });
                });

                const sortedYears = Array.from(allYearsSet).sort((a, b) => a - b);
                const allTraces = [];

                Array.from(allGenresSet).forEach(genre => {
                    const currentTrace = {
                        x: sortedYears,
                        y: [],
                        type: 'scatter',
                        mode: 'lines+markers',
                        name: genre,
                        hovertemplate: `<b>${genre}</b><br>Rating: %{y}<extra></extra>`,
                        line: { color: colorPalette[genre] || "#333", width: 2 },
                        marker: { color: colorPalette[genre] || "#333", size: 5 }
                    };

                    sortedYears.forEach(year => {
                        if (statsByYear[year] && statsByYear[year][genre]) {
                            const data = statsByYear[year][genre];
                            const averageRating = data.ratingSum / data.movieCount;
                            currentTrace.y.push(parseFloat(averageRating.toFixed(2)));
                        } else {
                            currentTrace.y.push(null);
                        }
                    });

                    allTraces.push(currentTrace);
                });

                const plotLayout = {
                    title: 'Calificación promedio de películas por género (2015-2025)',
                    xaxis: {
                        title: 'Año de Lanzamiento',
                        range: [2014.5, 2025.5],
                        tickmode: 'linear',
                        tick0: 2015,
                        dtick: 1,
                        tickangle: -60,
                        automargin: true
                    },
                    yaxis: {
                        title: 'Calificación Promedio',
                        range: [5.5, 8]
                    },
                    showlegend: true,
                    shapes: [
                        {
                            type: 'rect',
                            xref: 'x',
                            yref: 'paper',
                            x0: 2020,
                            x1: 2022.5,
                            y0: 0,
                            y1: 1,
                            fillcolor: '#d3d3d3',
                            opacity: 0.3,
                            line: { width: 0 }
                        }
                    ],
                    annotations: [
                        {
                            x: 2021,
                            y: 1,
                            xref: 'x',
                            yref: 'paper',
                            text: 'COVID-19',
                            showarrow: false,
                            font: { size: 12, color: '#888888' },
                            yanchor: 'bottom'
                        }
                    ]
                };
                Plotly.newPlot('chartContainer', allTraces, plotLayout);
            })
            .catch(error => console.error("Error loading data:", error));
    </script>
</body>
</html>
